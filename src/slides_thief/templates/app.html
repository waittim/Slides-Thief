<!doctype html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slides Thief</title>
<style>
:root {
  color-scheme: light;
  --bg: #f6f8fa;
  --panel: #ffffff;
  --panel-strong: #edf3f5;
  --topbar-bg: rgba(255, 255, 255, .92);
  --text: #172026;
  --muted: #64717a;
  --line: #d8e1e7;
  --accent: #c84535;
  --accent-2: #0f766e;
  --accent-2-text: #ffffff;
  --warn: #b7791f;
  --handle: #ffd84a;
  --control-bg: #ffffff;
  --control-hover: #aebbc4;
  --primary-bg: #172026;
  --primary-text: #ffffff;
  --drop-line: #aebbc4;
  --drop-bg: #fbfcfd;
  --drop-active-bg: #edf8f6;
  --thumb-bg: #f8fafb;
  --chip-bg: #eef2f5;
  --low-bg: #fff3d6;
  --low-text: #8a4c06;
  --stage-grid: rgba(23, 32, 38, .04);
  --empty-bg: rgba(255, 255, 255, .74);
  --handle-stroke: #2a3034;
  --handle-text: #172026;
  --canvas-outline: rgba(255, 255, 255, .36);
  --canvas-quad: rgba(200, 69, 53, .98);
  --toast-text: #ffffff;
  --shadow: 0 10px 28px rgba(21, 32, 38, .08);
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --bg: #101416;
  --panel: #171d20;
  --panel-strong: #222b2f;
  --topbar-bg: rgba(23, 29, 32, .94);
  --text: #eef4f6;
  --muted: #9daab1;
  --line: #344147;
  --accent: #ff7b68;
  --accent-2: #32c8ba;
  --accent-2-text: #081513;
  --warn: #e5ae4c;
  --handle: #ffd84a;
  --control-bg: #1d2529;
  --control-hover: #5b6b73;
  --primary-bg: #eef4f6;
  --primary-text: #101416;
  --drop-line: #5b6b73;
  --drop-bg: #14191c;
  --drop-active-bg: #132c2a;
  --thumb-bg: #11181b;
  --chip-bg: #253035;
  --low-bg: #3a2d16;
  --low-text: #ffca73;
  --stage-grid: rgba(238, 244, 246, .055);
  --empty-bg: rgba(20, 25, 28, .78);
  --handle-stroke: #101416;
  --handle-text: #172026;
  --canvas-outline: rgba(238, 244, 246, .32);
  --canvas-quad: rgba(255, 123, 104, .98);
  --toast-text: #101416;
  --shadow: 0 10px 28px rgba(0, 0, 0, .34);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark;
    --bg: #101416;
    --panel: #171d20;
    --panel-strong: #222b2f;
    --topbar-bg: rgba(23, 29, 32, .94);
    --text: #eef4f6;
    --muted: #9daab1;
    --line: #344147;
    --accent: #ff7b68;
    --accent-2: #32c8ba;
    --accent-2-text: #081513;
    --warn: #e5ae4c;
    --handle: #ffd84a;
    --control-bg: #1d2529;
    --control-hover: #5b6b73;
    --primary-bg: #eef4f6;
    --primary-text: #101416;
    --drop-line: #5b6b73;
    --drop-bg: #14191c;
    --drop-active-bg: #132c2a;
    --thumb-bg: #11181b;
    --chip-bg: #253035;
    --low-bg: #3a2d16;
    --low-text: #ffca73;
    --stage-grid: rgba(238, 244, 246, .055);
    --empty-bg: rgba(20, 25, 28, .78);
    --handle-stroke: #101416;
    --handle-text: #172026;
    --canvas-outline: rgba(238, 244, 246, .32);
    --canvas-quad: rgba(255, 123, 104, .98);
    --toast-text: #101416;
    --shadow: 0 10px 28px rgba(0, 0, 0, .34);
  }
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}
button, input, select {
  font: inherit;
  color: inherit;
}
button {
  height: 34px;
  border: 1px solid var(--line);
  background: var(--control-bg);
  border-radius: 6px;
  padding: 0 11px;
  cursor: pointer;
}
button:hover { border-color: var(--control-hover); }
button:disabled { cursor: not-allowed; opacity: .55; }
button.primary {
  background: var(--primary-bg);
  border-color: var(--primary-bg);
  color: var(--primary-text);
}
button.green {
  background: var(--accent-2);
  border-color: var(--accent-2);
  color: var(--accent-2-text);
}
button.icon {
  width: 36px;
  padding: 0;
  font-size: 18px;
}
select, input[type="number"], input[type="text"] {
  height: 34px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--control-bg);
  padding: 0 9px;
  min-width: 0;
}
label {
  display: grid;
  gap: 4px;
  color: var(--muted);
  font-size: 12px;
}
label > span { white-space: nowrap; }
a { color: var(--accent-2); text-decoration: none; }
a:hover { text-decoration: underline; }
.app {
  height: 100vh;
  height: 100dvh;
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  overflow: hidden;
}
.topbar {
  min-height: 58px;
  display: grid;
  grid-template-columns: minmax(150px, 230px) minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--topbar-bg);
  position: sticky;
  top: 0;
  z-index: 20;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.mark {
  width: 30px;
  height: 30px;
  display: grid;
  place-items: center;
  border-radius: 7px;
  background: var(--primary-bg);
  color: var(--primary-text);
  font-weight: 750;
}
.brandText {
  font-weight: 760;
  font-size: 16px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.settings {
  --settings-columns: 94px 108px 108px 138px minmax(220px, 1fr) 76px 104px 116px;
  display: grid;
  grid-template-columns: var(--settings-columns);
  gap: 8px;
  align-items: center;
  min-width: 0;
  overflow-x: auto;
  scrollbar-width: thin;
}
.settings label {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 34px;
  min-width: 0;
}
.settings label:not(.checks) > span {
  flex: 0 0 auto;
}
.settings label:not(.checks) > select,
.settings label:not(.checks) > input[type="number"],
.settings label:not(.checks) > input[type="text"] {
  flex: 1 1 auto;
  width: 100%;
  min-width: 0;
}
.checks {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 34px;
  color: var(--text);
  font-size: 13px;
}
.checks input { width: 16px; height: 16px; }
.shell {
  min-height: 0;
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr) 280px;
  overflow: hidden;
}
.shell.inspectorCollapsed {
  grid-template-columns: 300px minmax(0, 1fr) 48px;
}
.sidebar, .inspector {
  min-height: 0;
  background: var(--panel);
  border-right: 1px solid var(--line);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  overflow: hidden;
}
.sidebar {
  grid-template-rows: auto auto auto minmax(0, 1fr);
}
.inspector {
  border-right: 0;
  border-left: 1px solid var(--line);
}
.inspectorToggle {
  margin-left: 0;
  flex: 0 0 auto;
}
.inspector.collapsed {
  grid-template-rows: minmax(0, 1fr);
}
.inspector.collapsed .sectionHead {
  min-height: 0;
  height: 100%;
  padding: 8px 6px;
  flex-direction: column;
  justify-content: flex-start;
}
.inspector.collapsed .sectionHead h2 {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  margin: 8px 0;
}
.inspector.collapsed .sectionHead .count,
.inspector.collapsed .inspectorBody {
  display: none;
}
.sidebarActions {
  padding: 10px 12px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 8px;
  border-bottom: 1px solid var(--line);
}
.sidebarActions button {
  width: 100%;
}
.sidebarRunMeta {
  padding: 10px 12px;
  display: grid;
  gap: 10px;
  border-bottom: 1px solid var(--line);
}
.sidebarStatus {
  min-height: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
}
.statusDot {
  width: 8px;
  height: 8px;
  flex: 0 0 auto;
  border-radius: 999px;
  background: var(--muted);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--muted) 18%, transparent);
}
.statusDot.busy {
  background: var(--accent-2);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-2) 18%, transparent);
}
.statusDot.good {
  background: #16a34a;
  box-shadow: 0 0 0 3px color-mix(in srgb, #16a34a 18%, transparent);
}
.statusDot.bad {
  background: #dc2626;
  box-shadow: 0 0 0 3px color-mix(in srgb, #dc2626 18%, transparent);
}
.sidebarLinks:empty {
  display: none;
}
.sectionHead {
  min-height: 50px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--line);
}
.sectionHead h2 {
  margin: 0;
  font-size: 13px;
  line-height: 1.2;
  font-weight: 760;
}
.sectionHead .count {
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
}
.fileInput {
  width: 1px;
  height: 1px;
  opacity: 0;
  position: absolute;
  pointer-events: none;
}
.dropzone {
  margin: 12px;
  min-height: 112px;
  border: 1px dashed var(--drop-line);
  border-radius: 8px;
  display: grid;
  place-items: center;
  text-align: center;
  background: var(--drop-bg);
  color: var(--muted);
  padding: 12px;
}
.dropzone.active {
  border-color: var(--accent-2);
  background: var(--drop-active-bg);
  color: var(--accent-2);
}
.dropzone strong {
  color: var(--text);
  display: block;
  font-size: 14px;
  margin-bottom: 4px;
}
.sidebar > div:last-child {
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}
.files, .slides {
  overflow: auto;
  min-height: 0;
  padding: 0 8px 12px;
}
.fileRow, .slideRow {
  width: 100%;
  min-height: 44px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  border: 1px solid transparent;
  border-radius: 7px;
  background: transparent;
  padding: 6px 8px;
  text-align: left;
}
.fileRow, .slideRow {
  grid-template-columns: 28px 64px minmax(0, 1fr) auto;
  min-height: 56px;
}
.fileRow { cursor: pointer; }
.fileRow:hover, .fileRow.active, .slideRow:hover, .slideRow.active {
  border-color: var(--line);
  background: var(--panel-strong);
}
.thumb {
  width: 64px;
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--thumb-bg);
  object-fit: cover;
}
.thumb.placeholder {
  display: grid;
  place-items: center;
  color: var(--muted);
  font-size: 11px;
}
.idx {
  width: 26px;
  height: 24px;
  display: grid;
  place-items: center;
  border-radius: 6px;
  background: var(--chip-bg);
  color: var(--muted);
  font-size: 12px;
}
.name {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sub {
  color: var(--muted);
  font-size: 12px;
}
.badge {
  min-width: 42px;
  height: 24px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background: var(--chip-bg);
  color: var(--muted);
  font-size: 12px;
}
.badge.low {
  color: var(--low-text);
  background: var(--low-bg);
}
.workspace {
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  overflow: hidden;
}
.reviewBar {
  min-height: 50px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.reviewBar .title {
  min-width: 0;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 700;
}
.stage {
  min-height: 0;
  display: grid;
  place-items: center;
  padding: 16px;
  overflow: auto;
  background:
    linear-gradient(45deg, var(--stage-grid) 25%, transparent 25%),
    linear-gradient(-45deg, var(--stage-grid) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, var(--stage-grid) 75%),
    linear-gradient(-45deg, transparent 75%, var(--stage-grid) 75%);
  background-size: 28px 28px;
  background-position: 0 0, 0 14px, 14px -14px, -14px 0;
}
.canvasShell {
  min-width: 100%;
  width: max-content;
  display: grid;
  place-items: center;
}
canvas {
  display: block;
  background: transparent;
  border: 0;
  cursor: crosshair;
}
canvas[hidden] {
  display: none;
}
.zoomControls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.zoomValue {
  min-width: 48px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
}
.empty {
  width: min(560px, 90%);
  min-height: 220px;
  display: grid;
  place-items: center;
  color: var(--muted);
  text-align: center;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: var(--empty-bg);
  padding: 22px;
}
.inspectorBody {
  overflow: auto;
  min-height: 0;
  padding: 12px;
  display: grid;
  align-content: start;
  gap: 14px;
}
.metric {
  display: grid;
  grid-template-columns: 92px minmax(0, 1fr);
  gap: 8px;
  align-items: center;
}
.metric .key { color: var(--muted); }
.metric .value {
  min-width: 0;
  overflow-wrap: anywhere;
}
.links {
  display: grid;
  gap: 8px;
}
.links a {
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border: 1px solid var(--primary-bg);
  border-radius: 6px;
  background: var(--primary-bg);
  color: var(--primary-text);
  padding: 7px 11px;
  font-weight: 700;
  text-decoration: none;
}
.links a:hover {
  text-decoration: none;
  border-color: var(--primary-bg);
}
.links a .sub {
  color: inherit;
  font-weight: 700;
}
.cornerTable {
  display: grid;
  gap: 6px;
}
.cornerRow {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  gap: 8px;
  align-items: center;
  min-height: 30px;
}
.dot {
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background: var(--handle);
  border: 1px solid var(--handle-stroke);
  font-size: 12px;
  font-weight: 760;
}
.statusLine {
  color: var(--muted);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast {
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  min-height: 36px;
  display: grid;
  place-items: center;
  background: var(--text);
  color: var(--toast-text);
  border-radius: 7px;
  padding: 8px 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .16s ease;
  z-index: 50;
}
.toast.show { opacity: 1; }
@media (max-width: 1100px) {
  .topbar {
    grid-template-columns: minmax(130px, 190px) minmax(0, 1fr);
    gap: 10px;
  }
  .settings {
    grid-template-columns: var(--settings-columns);
    padding-bottom: 2px;
  }
  .statusLine { min-width: 100px; }
  .shell {
    grid-template-columns: 250px minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr) minmax(180px, 28vh);
  }
  .shell.inspectorCollapsed {
    grid-template-columns: 250px minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr) 48px;
  }
  .inspector {
    grid-column: 1 / -1;
    min-height: 0;
    border-left: 0;
    border-top: 1px solid var(--line);
  }
  .inspector.collapsed .sectionHead {
    min-height: 48px;
    height: auto;
    padding: 8px 12px;
    flex-direction: row;
    justify-content: flex-start;
  }
  .inspector.collapsed .sectionHead h2 {
    writing-mode: horizontal-tb;
    margin: 0;
  }
}
@media (max-width: 760px) {
  .topbar {
    grid-template-columns: minmax(112px, 140px) minmax(0, 1fr);
  }
  .shell {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(260px, 32vh) minmax(0, 1fr) minmax(160px, 22vh);
  }
  .shell.inspectorCollapsed {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(260px, 32vh) minmax(0, 1fr) 48px;
  }
  .sidebar {
    min-height: 0;
    border-right: 0;
    border-bottom: 1px solid var(--line);
    overflow: auto;
  }
  .settings {
    grid-template-columns: var(--settings-columns);
  }
  .reviewBar { flex-wrap: wrap; }
  .stage { padding: 8px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="mark">ST</div>
      <div class="brandText">Slides Thief</div>
    </div>
    <div class="settings">
      <label><span data-i18n="settings.ratio">比例</span><select id="ratio"><option value="16:9">16:9</option><option value="4:3">4:3</option></select></label>
      <label><span data-i18n="settings.width">宽度</span><input id="width" type="number" min="800" max="6000" value="2400"></label>
      <label><span data-i18n="settings.height">高度</span><input id="height" type="number" min="600" max="6000" placeholder="自动" data-i18n-placeholder="settings.heightAuto"></label>
      <label><span data-i18n="settings.quality">导出质量</span><input id="quality" type="number" min="60" max="98" value="92"></label>
      <label><span data-i18n="settings.pdfFile">目标文件名</span><input id="pdfName" type="text" value="flattened_slides.pdf"></label>
      <label class="checks"><input id="grayscale" type="checkbox"><span data-i18n="settings.grayscale">灰度</span></label>
      <label><span data-i18n="settings.theme">主题</span><select id="themeMode"><option value="auto" data-i18n="theme.auto">自动</option><option value="light" data-i18n="theme.light">亮色</option><option value="dark" data-i18n="theme.dark">暗色</option></select></label>
      <label><span data-i18n="settings.language">语言</span><select id="localeMode"><option value="auto" data-i18n="language.auto">自动</option><option value="zh-CN" data-i18n="language.zh">中文</option><option value="en" data-i18n="language.en">English</option></select></label>
    </div>
  </header>

  <main id="shell" class="shell">
    <aside class="sidebar">
      <div class="sidebarActions">
        <button id="runAuto" class="primary" disabled data-i18n="actions.runAuto">自动识别</button>
        <button id="runRefine" class="green" disabled data-i18n="actions.runRefine">生成 PDF</button>
      </div>
      <div class="sidebarRunMeta">
        <div class="sidebarStatus" role="status" aria-live="polite">
          <span id="statusDot" class="statusDot"></span>
          <span id="status" class="statusLine">待上传</span>
        </div>
        <div id="links" class="links sidebarLinks"></div>
      </div>
      <div class="sectionHead">
        <h2 data-i18n="section.images">图片</h2>
        <span id="fileCount" class="count">0</span>
      </div>
      <div>
        <input id="fileInput" class="fileInput" type="file" accept="image/*,.heic,.heif,.tif,.tiff" multiple>
        <div id="dropzone" class="dropzone">
          <div><strong data-i18n="drop.title">点击或拖拽上传</strong><span data-i18n="drop.subtitle">支持 JPG、PNG、TIFF、HEIC/HEIF，按文件名排序</span></div>
        </div>
        <div id="files" class="files"></div>
      </div>
    </aside>

    <section class="workspace">
      <div class="reviewBar">
        <button id="prev" class="icon" disabled title="上一页" data-i18n-title="nav.prev">‹</button>
        <button id="next" class="icon" disabled title="下一页" data-i18n-title="nav.next">›</button>
        <div id="slideTitle" class="title">未选择页面</div>
        <div class="zoomControls">
          <button id="zoomOut" class="icon" disabled title="缩小" data-i18n-title="zoom.out">−</button>
          <span id="zoomValue" class="zoomValue">100%</span>
          <button id="zoomIn" class="icon" disabled title="放大" data-i18n-title="zoom.in">+</button>
          <button id="zoomFit" disabled title="适合窗口" data-i18n="zoom.fit" data-i18n-title="zoom.fitTitle">适合</button>
        </div>

      </div>
      <div id="stage" class="stage">
        <div class="canvasShell">
          <canvas id="canvas" hidden></canvas>
          <div id="empty" class="empty">上传图片后点击自动识别按钮</div>
        </div>

    <aside id="inspector" class="inspector">
      <div class="sectionHead">
        <h2 data-i18n="section.details">详情</h2>
        <span id="slideCount" class="count">0</span>
        <button id="toggleInspector" class="icon inspectorToggle" type="button" title="缩小详情栏" data-i18n-title="details.collapse">›</button>
      </div>

        <div id="metrics"></div>
        <div id="cornerTable" class="cornerTable"></div>
      </div>
    </aside>
  </main>
</div>

const $ = id => document.getElementById(id);
const els = {

const ctx = els.canvas.getContext("2d");
const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: "base" });
const I18N = {

    "errors.invalidJobId": "Invalid job id",
    "errors.jobNotFound": "Job not found",
    "errors.manualQuads": "manualQuads must be an object"
  }
};
const ERROR_KEYS = {
  "No supported images were uploaded": "errors.noSupportedImages",
  "No preview file was uploaded": "errors.noPreviewFile",
  "Unsupported image type": "errors.unsupportedImageType",
  "Invalid job id": "errors.invalidJobId",
  "Job not found": "errors.jobNotFound",
  "manualQuads must be an object": "errors.manualQuads"
};
const STORAGE_KEYS = {
  theme: "slidesThief.theme",
  locale: "slidesThief.locale",
  inspector: "slidesThief.inspector"
};
function storageGet(key, fallback) {
  try {
    return localStorage.getItem(key) || fallback;
  } catch (_) {
    return fallback;
  }
}
function storageSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (_) {}
}
function normalizeChoice(value, choices, fallback) {
  return choices.includes(value) ? value : fallback;
}
const ui = {
  themeMode: normalizeChoice(storageGet(STORAGE_KEYS.theme, "auto"), ["auto", "light", "dark"], "auto"),
  localeMode: normalizeChoice(storageGet(STORAGE_KEYS.locale, "auto"), ["auto", "zh-CN", "en"], "auto"),
  locale: "zh-CN",
  inspectorCollapsed: storageGet(STORAGE_KEYS.inspector, "expanded") === "collapsed"
};
const app = {
  files: [],
  previews: new Map(),
  previewThumbs: new Map(),
  previewPromises: new Map(),
  previewBatch: 0,
  preview: null,
  previewIndex: -1,
  jobId: null,
  activeRun: null,
  finalRun: null,
  quads: {},
  slideThumbs: new Map(),
  dirtyThumbs: new Set(),
  index: 0,
  image: new Image(),
  viewport: null,
  zoom: 1,
  zoomMode: "fit",
  dragging: -1,
  statusKey: "status.idle",
  statusVars: {},
  emptyKey: "empty.uploadPrompt",
  emptyVars: {}
};

function resolveLocale() {
  if (ui.localeMode !== "auto") return ui.localeMode;
  const languages = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || ""];
  return languages.some(language => String(language).toLowerCase().startsWith("zh")) ? "zh-CN" : "en";
}

function t(key, vars = {}) {
  const dictionary = I18N[ui.locale] || I18N.en;
  const text = dictionary[key] || I18N.en[key] || I18N["zh-CN"][key] || key;
  return text.replace(/\{(\w+)\}/g, (_, name) => vars[name] ?? "");
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function applyTheme() {
  document.documentElement.dataset.theme = ui.themeMode;
  els.themeMode.value = ui.themeMode;
  if (currentImageItem()) requestAnimationFrame(draw);
}

function applyLocale() {
  ui.locale = resolveLocale();
  document.documentElement.lang = ui.locale;
  els.localeMode.value = ui.localeMode;
  document.querySelectorAll("[data-i18n]").forEach(element => {
    element.textContent = t(element.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-title]").forEach(element => {
    element.title = t(element.dataset.i18nTitle);
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(element => {
    element.placeholder = t(element.dataset.i18nPlaceholder);
  });
  setInspectorCollapsed(ui.inspectorCollapsed, { persist: false, refit: false });
  renderLocalizedState();
}

function setInspectorCollapsed(collapsed, options = {}) {
  const persist = options.persist !== false;
  const refit = options.refit !== false;
  ui.inspectorCollapsed = Boolean(collapsed);
  els.shell.classList.toggle("inspectorCollapsed", ui.inspectorCollapsed);
  els.inspector.classList.toggle("collapsed", ui.inspectorCollapsed);
  const titleKey = ui.inspectorCollapsed ? "details.expand" : "details.collapse";
  els.toggleInspector.textContent = ui.inspectorCollapsed ? "‹" : "›";
  els.toggleInspector.title = t(titleKey);
  els.toggleInspector.setAttribute("aria-label", t(titleKey));
  els.toggleInspector.setAttribute("aria-expanded", String(!ui.inspectorCollapsed));
  if (persist) storageSet(STORAGE_KEYS.inspector, ui.inspectorCollapsed ? "collapsed" : "expanded");
  if (refit) {
    requestAnimationFrame(() => {
      if (app.zoomMode === "fit" && currentImageItem()) fitCanvas();
      else if (currentImageItem()) draw();
    });
  }
}

function renderLocalizedState() {
  setStatus(app.statusKey, app.statusVars);
  if (!els.empty.hidden) setEmpty(app.emptyKey, app.emptyVars);
  if (app.activeRun) {
    renderSlideList();
    updateSlideTitle();
    renderMetrics();
    renderCorners();
  } else {
    renderFiles();
    updatePreviewTitle();
    if (app.preview) renderPreviewInfo(app.preview);
  }
  renderLinks();
  updateZoomControls();
}

function updatePreviewTitle() {
  if (app.previewIndex >= 0 && app.files[app.previewIndex]) {
    const file = app.files[app.previewIndex];
    els.slideTitle.textContent = `${String(app.previewIndex + 1).padStart(2, "0")}  ${file.name}`;
  } else {
    els.slideTitle.textContent = t("slide.none");
  }
}

function updateSlideTitle() {
  const slide = currentSlide();
  els.slideTitle.textContent = slide ? `${String(app.index + 1).padStart(2, "0")}  ${slide.filename}` : t("slide.none");
}

function formatBytes(size) {
  if (size < 1024) return `${size} B`;
  if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
  return `${(size / 1024 / 1024).toFixed(1)} MB`;
}

function settingsPayload() {
  return {
    ratio: els.ratio.value,
    width: Number(els.width.value || 2400),
    height: els.height.value ? Number(els.height.value) : null,
    jpegQuality: Number(els.quality.value || 92),
    grayscale: els.grayscale.checked,
    pdfName: els.pdfName.value || "flattened_slides.pdf"
  };
}

function setStatus(key, vars = {}) {
  app.statusKey = key;
  app.statusVars = vars;
  els.status.textContent = t(key, vars);
  els.statusDot.className = `statusDot ${statusTone(key)}`;
}

function statusTone(key) {
  if (key === "status.failed") return "bad";
  if (["status.reviewReady", "status.generated"].includes(key)) return "good";
  if (["status.previewing", "status.detecting", "status.generating"].includes(key)) return "busy";
  return "neutral";
}

function setEmpty(key, vars = {}) {
  app.emptyKey = key;
  app.emptyVars = vars;
  els.empty.textContent = t(key, vars);
}

function toast(text) {
  els.toast.textContent = text;
  els.toast.classList.add("show");
  setTimeout(() => els.toast.classList.remove("show"), 1300);
}

function toastKey(key, vars = {}) {
  toast(t(key, vars));
}

function toastError(error) {
  const message = error && error.message ? error.message : String(error);
  const key = ERROR_KEYS[message];
  toast(key ? t(key) : message);
}

function setBusy(busy) {
  els.runAuto.disabled = busy || app.files.length === 0;
  els.runRefine.disabled = busy || !app.activeRun;
}

function handleFiles(fileList) {
  const supported = [".jpg", ".jpeg", ".png", ".tif", ".tiff", ".heic", ".heif"];
  app.files = Array.from(fileList)
    .filter(file => supported.some(ext => file.name.toLowerCase().endsWith(ext)))
    .sort((a, b) => collator.compare(a.name, b.name));
  app.previews = new Map();
  app.previewThumbs = new Map();
  app.previewPromises = new Map();
  app.previewBatch += 1;
  app.preview = null;
  app.previewIndex = -1;
  app.activeRun = null;
  app.finalRun = null;
  app.jobId = null;
  app.quads = {};
  app.slideThumbs = new Map();
  app.dirtyThumbs = new Set();
  app.index = 0;
  app.viewport = null;
  renderFiles();
  renderLinks();
  els.metrics.replaceChildren();
  els.cornerTable.replaceChildren();
  els.slideCount.textContent = "0";
  updatePreviewTitle();
  els.prev.disabled = true;
  els.next.disabled = true;
  els.resetSlide.disabled = true;
  els.downloadJson.disabled = true;
  els.canvas.hidden = true;
  els.empty.hidden = false;
  setEmpty("empty.uploadPrompt");
  updateZoomControls();
  setBusy(false);
  setStatus(app.files.length ? "status.files" : "status.idle", { count: app.files.length });
  queuePreviewThumbnails();
}

function renderFiles() {
  els.fileCount.textContent = String(app.files.length);
  els.files.replaceChildren();
  app.files.forEach((file, i) => {
    const row = document.createElement("button");
    row.className = "fileRow" + (i === app.previewIndex ? " active" : "");
    row.onclick = () => loadPreview(i);
    const idx = document.createElement("div");
    idx.className = "idx";
    idx.textContent = String(i + 1).padStart(2, "0");
    const key = previewKey(file);
    let thumb;
    if (app.previewThumbs.has(key)) {
      thumb = document.createElement("img");
      thumb.className = "thumb";
      thumb.src = app.previewThumbs.get(key);
      thumb.alt = "";
    } else {
      thumb = document.createElement("div");
      thumb.className = "thumb placeholder";
      thumb.textContent = "…";
    }
    const main = document.createElement("div");
    main.className = "name";
    main.textContent = file.name;
    const sub = document.createElement("div");
    sub.className = "sub";
    sub.textContent = formatBytes(file.size);
    row.append(idx, thumb, main, sub);
    els.files.appendChild(row);
  });
}

function previewKey(file) {
  return `${file.name}:${file.size}:${file.lastModified}`;
}

async function previewForFile(file) {
  const key = previewKey(file);
  if (app.previews.has(key)) return app.previews.get(key);
  if (!app.previewPromises.has(key)) {
    const form = new FormData();
    form.append("file", file, file.name);
    const promise = fetchJson("/api/previews", { method: "POST", body: form })
      .then(data => {
        app.previews.set(key, data);
        app.previewThumbs.set(key, data.imageUrl);
        return data;
      })
      .finally(() => app.previewPromises.delete(key));
    app.previewPromises.set(key, promise);
  }
  return app.previewPromises.get(key);
}

function queuePreviewThumbnails() {
  const batch = app.previewBatch;
  (async () => {
    for (const file of app.files) {
      if (batch !== app.previewBatch || app.activeRun) return;
      const key = previewKey(file);
      if (app.previewThumbs.has(key)) continue;
      try {
        await previewForFile(file);
        if (batch !== app.previewBatch || app.activeRun) return;
        renderFiles();
      } catch (_) {
        if (batch !== app.previewBatch || app.activeRun) return;
      }
    }
  })();
}

async function loadPreview(index) {
  if (app.activeRun || !app.files.length) return;
  app.previewIndex = Math.max(0, Math.min(app.files.length - 1, index));
  const file = app.files[app.previewIndex];
  renderFiles();
  updatePreviewTitle();
  els.prev.disabled = app.previewIndex === 0;
  els.next.disabled = app.previewIndex >= app.files.length - 1;
  els.resetSlide.disabled = true;
  els.downloadJson.disabled = true;
  els.canvas.hidden = true;
  els.empty.hidden = false;
  setEmpty("empty.previewing");
  setStatus("status.previewing");

  try {
    const data = await previewForFile(file);
    if (app.activeRun || app.files[app.previewIndex] !== file) return;
    app.preview = data;
    app.image = new Image();
    app.image.onload = () => {
      els.canvas.hidden = false;
      els.empty.hidden = true;
      configureCanvas(data);
      if (app.zoomMode === "fit") {
        fitCanvas();
      } else {
        applyCanvasZoom();
        draw();
        scheduleFocusImage();
      }
    };
    app.image.onerror = () => {
      els.canvas.hidden = true;
      els.empty.hidden = false;
      setEmpty("empty.previewFail");
      updateZoomControls();
      toastKey("errors.previewFile");
    };
    app.image.src = data.imageUrl;
    renderPreviewInfo(data);
    setStatus("status.files", { count: app.files.length });
  } catch (err) {
    setEmpty("empty.previewCreateFail");
    setStatus("status.files", { count: app.files.length });
    toastError(err);
  }
}

function renderPreviewInfo(preview) {
  const rows = [
    [t("metrics.file"), preview.filename],
    [t("metrics.status"), t("metrics.pendingAuto")],
    [t("metrics.dimensions"), `${preview.origWidth} × ${preview.origHeight}`]
  ];
  const wrap = document.createElement("div");
  rows.forEach(([key, value]) => {
    const row = document.createElement("div");
    row.className = "metric";
    const k = document.createElement("div");
    k.className = "key";
    k.textContent = key;
    const v = document.createElement("div");
    v.className = "value";
    v.textContent = value;
    row.append(k, v);
    wrap.appendChild(row);
  });
  els.metrics.replaceChildren(wrap);
  els.cornerTable.replaceChildren();
  els.links.replaceChildren();
}

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  const payload = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
  return payload;
}

async function runAuto() {
  if (!app.files.length) return;
  setBusy(true);
  setStatus("status.detecting");
  const settings = settingsPayload();
  const form = new FormData();
  for (const file of app.files) form.append("files", file, file.name);
  form.append("ratio", settings.ratio);
  form.append("width", String(settings.width));
  if (settings.height) form.append("height", String(settings.height));
  form.append("jpeg_quality", String(settings.jpegQuality));
  form.append("grayscale", settings.grayscale ? "1" : "0");
  form.append("pdf_name", settings.pdfName);
  try {
    const data = await fetchJson("/api/jobs", { method: "POST", body: form });
    setRun(data);
    setStatus("status.reviewReady");
    toastKey("toast.autoDone");
  } catch (err) {
    setStatus("status.failed");
    toastError(err);
  } finally {
    setBusy(false);
  }
}

async function runRefine() {
  if (!app.activeRun || !app.jobId) return;
  refreshCurrentThumbnail();
  setBusy(true);
  setStatus("status.generating");
  try {
    const data = await fetchJson(`/api/jobs/${encodeURIComponent(app.jobId)}/refine`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        settings: settingsPayload(),
        manualQuads: app.quads
      })
    });
    app.finalRun = data;
    setRun(data, { keepIndex: true });
    setStatus("status.generated");
    toastKey("toast.pdfUpdated");
  } catch (err) {
    setStatus("status.failed");
    toastError(err);
  } finally {
    setBusy(false);
  }
}

function setRun(data, options = {}) {
  app.jobId = data.jobId;
  app.activeRun = data;
  app.preview = null;
  app.previewIndex = -1;
  app.slideThumbs = new Map();
  app.dirtyThumbs = new Set();
  app.quads = Object.fromEntries(data.slides.map(slide => [
    slide.filename,
    slide.quad.map(point => [...point])
  ]));
  app.index = options.keepIndex ? Math.min(app.index, data.slides.length - 1) : 0;
  renderSlideList();
  renderLinks();
  loadSlide(app.index);
  els.runRefine.disabled = false;
  els.downloadJson.disabled = false;
  els.resetSlide.disabled = false;
}

function renderSlideList() {
  els.files.replaceChildren();
  const slides = app.activeRun ? app.activeRun.slides : [];
  els.fileCount.textContent = String(slides.length);
  els.slideCount.textContent = String(slides.length);
  slides.forEach((slide, i) => {
    const row = document.createElement("button");
    row.className = "slideRow" + (i === app.index ? " active" : "");
    row.onclick = () => loadSlide(i);
    const idx = document.createElement("div");
    idx.className = "idx";
    idx.textContent = String(i + 1).padStart(2, "0");
    const thumb = document.createElement("img");
    thumb.className = "thumb";
    thumb.src = app.slideThumbs.get(slide.filename) || slide.correctedUrl;
    thumb.alt = "";
    const main = document.createElement("div");
    main.className = "name";
    main.textContent = slide.filename;
    const badge = document.createElement("div");
    badge.className = "badge" + (slide.confidence < 0.65 ? " low" : "");
    badge.textContent = Number(slide.confidence).toFixed(2);
    row.append(idx, thumb, main, badge);
    els.files.appendChild(row);
  });
}

function currentSlide() {
  return app.activeRun && app.activeRun.slides[app.index];
}

function currentImageItem() {
  return currentSlide() || app.preview;
}

function loadSlide(index) {
  if (!app.activeRun || !app.activeRun.slides.length) return;
  if (index !== app.index) refreshCurrentThumbnail();
  app.index = Math.max(0, Math.min(app.activeRun.slides.length - 1, index));
  const slide = currentSlide();
  renderSlideList();
  updateSlideTitle();
  els.prev.disabled = app.index === 0;
  els.next.disabled = app.index >= app.activeRun.slides.length - 1;
  app.image = new Image();
  app.image.onload = () => {
    els.canvas.hidden = false;
    els.empty.hidden = true;
    configureCanvas(slide);
    if (app.zoomMode === "fit") {
      fitCanvas();
    } else {
      applyCanvasZoom();
      draw();
      scheduleFocusImage();
    }
  };
  app.image.src = slide.imageUrl;
  renderMetrics();
  renderCorners();
}

function configureCanvas(slide) {
  const padX = Math.max(140, Math.round(slide.assetWidth * 0.25));
  const padY = Math.max(140, Math.round(slide.assetHeight * 0.25));
  app.viewport = {
    padX,
    padY,
    imageWidth: slide.assetWidth,
    imageHeight: slide.assetHeight,
    totalWidth: slide.assetWidth + padX * 2,
    totalHeight: slide.assetHeight + padY * 2
  };
}

function updateZoomControls() {
  const enabled = Boolean(currentImageItem()) && !els.canvas.hidden;
  els.zoomOut.disabled = !enabled;
  els.zoomIn.disabled = !enabled;
  els.zoomFit.disabled = !enabled;
  els.zoomValue.textContent = enabled ? `${Math.round(app.zoom * 100)}%` : "100%";
}

function applyCanvasZoom() {
  const view = app.viewport;
  if (!view) return;
  const width = Math.max(1, Math.round(view.totalWidth * app.zoom));
  const height = Math.max(1, Math.round(view.totalHeight * app.zoom));
  els.canvas.width = width;
  els.canvas.height = height;
  els.canvas.style.width = `${width}px`;
  els.canvas.style.height = `${height}px`;
  updateZoomControls();
}

function setCanvasZoom(zoom) {
  app.zoomMode = "manual";
  app.zoom = Math.max(0.12, Math.min(3, zoom));
  applyCanvasZoom();
  draw();
  scheduleFocusImage();
}

function fitCanvas() {
  const view = app.viewport;
  if (!currentImageItem() || !view) return;
  app.zoomMode = "fit";
  const availableW = Math.max(220, els.stage.clientWidth - 36);
  const availableH = Math.max(180, els.stage.clientHeight - 36);
  app.zoom = Math.max(0.12, Math.min(1, availableW / view.imageWidth, availableH / view.imageHeight));
  applyCanvasZoom();
  draw();
  scheduleFocusImage();
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function focusImage() {
  const view = app.viewport;
  if (!view || els.canvas.hidden) return;
  const imageX = view.padX * app.zoom;
  const imageY = view.padY * app.zoom;
  const imageW = view.imageWidth * app.zoom;
  const imageH = view.imageHeight * app.zoom;
  const marginX = imageW < els.stage.clientWidth ? (els.stage.clientWidth - imageW) / 2 : 18;
  const marginY = imageH < els.stage.clientHeight ? (els.stage.clientHeight - imageH) / 2 : 18;
  const maxLeft = Math.max(0, els.stage.scrollWidth - els.stage.clientWidth);
  const maxTop = Math.max(0, els.stage.scrollHeight - els.stage.clientHeight);
  els.stage.scrollLeft = clamp(imageX - marginX, 0, maxLeft);
  els.stage.scrollTop = clamp(imageY - marginY, 0, maxTop);
}

function scheduleFocusImage() {
  requestAnimationFrame(focusImage);
}

function toCanvasPoint(slide, point) {
  const view = app.viewport;
  return [
    (view.padX + point[0] / slide.origWidth * view.imageWidth) * app.zoom,
    (view.padY + point[1] / slide.origHeight * view.imageHeight) * app.zoom
  ];
}

function toOriginalPoint(slide, x, y) {
  const view = app.viewport;
  return [
    Math.round((x / app.zoom - view.padX) / view.imageWidth * slide.origWidth * 100) / 100,
    Math.round((y / app.zoom - view.padY) / view.imageHeight * slide.origHeight * 100) / 100
  ];
}

function draw() {
  const slide = currentSlide();
  const item = currentImageItem();
  const view = app.viewport;
  if (!item || !view || !app.image.complete) return;
  const imageX = view.padX * app.zoom;
  const imageY = view.padY * app.zoom;
  const imageW = view.imageWidth * app.zoom;
  const imageH = view.imageHeight * app.zoom;
  ctx.clearRect(0, 0, els.canvas.width, els.canvas.height);
  ctx.drawImage(app.image, imageX, imageY, imageW, imageH);
  ctx.strokeStyle = cssVar("--canvas-outline");
  ctx.lineWidth = 1.5;
  ctx.strokeRect(imageX, imageY, imageW, imageH);
  if (!slide) return;
  const pts = app.quads[slide.filename].map(point => toCanvasPoint(slide, point));
  ctx.lineWidth = 3;
  ctx.strokeStyle = cssVar("--canvas-quad");
  ctx.beginPath();
  pts.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
  ctx.closePath();
  ctx.stroke();
  pts.forEach(([x, y], i) => {
    const r = 9;
    ctx.fillStyle = "rgba(255, 216, 74, .98)";
    ctx.strokeStyle = cssVar("--handle-stroke");
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = cssVar("--handle-text");
    ctx.font = "700 13px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(i + 1), x, y + 1);
  });
}

function parseRatioValue(value) {
  if (String(value).includes(":")) {
    const [w, h] = String(value).split(":").map(Number);
    return w / h;
  }
  return Number(value) || 16 / 9;
}

function outputRatio() {
  return parseRatioValue((app.activeRun && app.activeRun.settings && app.activeRun.settings.ratio) || els.ratio.value);
}

function solveLinearSystem(matrix, vector) {
  const n = vector.length;
  const rows = matrix.map((row, i) => [...row, vector[i]]);
  for (let col = 0; col < n; col += 1) {
    let pivot = col;
    for (let row = col + 1; row < n; row += 1) {
      if (Math.abs(rows[row][col]) > Math.abs(rows[pivot][col])) pivot = row;
    }
    if (Math.abs(rows[pivot][col]) < 1e-9) throw new Error("Singular transform");
    [rows[col], rows[pivot]] = [rows[pivot], rows[col]];
    const scale = rows[col][col];
    for (let j = col; j <= n; j += 1) rows[col][j] /= scale;
    for (let row = 0; row < n; row += 1) {
      if (row === col) continue;
      const factor = rows[row][col];
      for (let j = col; j <= n; j += 1) rows[row][j] -= factor * rows[col][j];
    }
  }
  return rows.map(row => row[n]);
}

function perspectiveCoefficients(src, dst) {
  const matrix = [];
  const vector = [];
  dst.forEach(([x, y], i) => {
    const [u, v] = src[i];
    matrix.push([x, y, 1, 0, 0, 0, -u * x, -u * y]);
    matrix.push([0, 0, 0, x, y, 1, -v * x, -v * y]);
    vector.push(u, v);
  });
  return solveLinearSystem(matrix, vector);
}

function buildAdjustedThumbnail(slide) {
  const outW = 160;
  const outH = Math.max(1, Math.round(outW / outputRatio()));
  const srcW = slide.assetWidth;
  const srcH = slide.assetHeight;
  const sourceCanvas = document.createElement("canvas");
  sourceCanvas.width = srcW;
  sourceCanvas.height = srcH;
  const sourceCtx = sourceCanvas.getContext("2d");
  sourceCtx.drawImage(app.image, 0, 0, srcW, srcH);
  const source = sourceCtx.getImageData(0, 0, srcW, srcH).data;
  const outputCanvas = document.createElement("canvas");
  outputCanvas.width = outW;
  outputCanvas.height = outH;
  const outputCtx = outputCanvas.getContext("2d");
  const output = outputCtx.createImageData(outW, outH);
  const src = app.quads[slide.filename].map(([x, y]) => [
    x / slide.origWidth * slide.assetWidth,
    y / slide.origHeight * slide.assetHeight
  ]);
  const dst = [[0, 0], [outW, 0], [outW, outH], [0, outH]];
  const coeffs = perspectiveCoefficients(src, dst);
  for (let y = 0; y < outH; y += 1) {
    for (let x = 0; x < outW; x += 1) {
      const den = coeffs[6] * x + coeffs[7] * y + 1;
      const sx = (coeffs[0] * x + coeffs[1] * y + coeffs[2]) / den;
      const sy = (coeffs[3] * x + coeffs[4] * y + coeffs[5]) / den;
      const outIdx = (y * outW + x) * 4;
      if (sx >= 0 && sx < srcW && sy >= 0 && sy < srcH) {
        const ix = Math.max(0, Math.min(srcW - 1, Math.round(sx)));
        const iy = Math.max(0, Math.min(srcH - 1, Math.round(sy)));
        const srcIdx = (iy * srcW + ix) * 4;
        output.data[outIdx] = source[srcIdx];
        output.data[outIdx + 1] = source[srcIdx + 1];
        output.data[outIdx + 2] = source[srcIdx + 2];
        output.data[outIdx + 3] = 255;
      }
    }
  }
  outputCtx.putImageData(output, 0, 0);
  return outputCanvas.toDataURL("image/png");
}

function refreshCurrentThumbnail(force = false) {
  const slide = currentSlide();
  if (!slide || !app.image.complete) return;
  if (!force && !app.dirtyThumbs.has(slide.filename)) return;
  try {
    app.slideThumbs.set(slide.filename, buildAdjustedThumbnail(slide));
    app.dirtyThumbs.delete(slide.filename);
    renderSlideList();
  } catch (_) {}
}

function eventPoint(event) {
  const rect = els.canvas.getBoundingClientRect();
  return [
    (event.clientX - rect.left) / rect.width * els.canvas.width,
    (event.clientY - rect.top) / rect.height * els.canvas.height
  ];
}

function nearestHandle(x, y) {
  const slide = currentSlide();
  const pts = app.quads[slide.filename].map(point => toCanvasPoint(slide, point));
  const threshold = 28;
  let best = -1;
  let bestDist = Infinity;
  pts.forEach(([px, py], i) => {
    const dist = Math.hypot(px - x, py - y);
    if (dist < bestDist) {
      best = i;
      bestDist = dist;
    }
  });
  return bestDist <= threshold ? best : -1;
}

function renderMetrics() {
  const slide = currentSlide();
  if (!slide) {
    els.metrics.replaceChildren();
    return;
  }
  const rows = [
    [t("metrics.file"), slide.filename],
    [t("metrics.method"), slide.method],
    [t("metrics.confidence"), Number(slide.confidence).toFixed(3)],
    [t("metrics.dimensions"), `${slide.origWidth} × ${slide.origHeight}`]
  ];
  const wrap = document.createElement("div");
  rows.forEach(([key, value]) => {
    const row = document.createElement("div");
    row.className = "metric";
    const k = document.createElement("div");
    k.className = "key";
    k.textContent = key;
    const v = document.createElement("div");
    v.className = "value";
    v.textContent = value;
    row.append(k, v);
    wrap.appendChild(row);
  });
  els.metrics.replaceChildren(wrap);
}

function renderCorners() {
  const slide = currentSlide();
  els.cornerTable.replaceChildren();
  if (!slide) return;
  app.quads[slide.filename].forEach((point, i) => {
    const row = document.createElement("div");
    row.className = "cornerRow";
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.textContent = String(i + 1);
    const value = document.createElement("div");
    value.className = "sub";
    value.textContent = `${point[0].toFixed(2)}, ${point[1].toFixed(2)}`;
    row.append(dot, value);
    els.cornerTable.appendChild(row);
  });
}

function renderLinks() {
  els.links.replaceChildren();
  const run = app.finalRun || app.activeRun;
  if (!run) return;
  const items = [
    ["PDF", run.pdfUrl]
  ];
  for (const [label, url] of items) {
    if (!url) continue;
    const link = document.createElement("a");
    link.href = url;
    link.download = "";
    link.textContent = `${t("links.download")} ${label}`;
    els.links.appendChild(link);
  }
}

function resetCurrent() {
  const slide = currentSlide();
  if (!slide) return;
  app.quads[slide.filename] = slide.quad.map(point => [...point]);
  app.slideThumbs.delete(slide.filename);
  app.dirtyThumbs.delete(slide.filename);
  draw();
  renderCorners();
  renderSlideList();
}

function downloadManualJson() {
  if (!app.activeRun) return;
  const blob = new Blob([JSON.stringify(app.quads, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "manual_quads.json";
  a.click();
  URL.revokeObjectURL(url);
}

els.fileInput.onchange = event => handleFiles(event.target.files);
els.runAuto.onclick = runAuto;
els.runRefine.onclick = runRefine;
els.prev.onclick = () => app.activeRun ? loadSlide(app.index - 1) : loadPreview(app.previewIndex - 1);
els.next.onclick = () => app.activeRun ? loadSlide(app.index + 1) : loadPreview(app.previewIndex + 1);
els.zoomOut.onclick = () => setCanvasZoom(app.zoom / 1.25);
els.zoomIn.onclick = () => setCanvasZoom(app.zoom * 1.25);
els.zoomFit.onclick = fitCanvas;
els.resetSlide.onclick = resetCurrent;
els.downloadJson.onclick = downloadManualJson;
els.toggleInspector.onclick = () => setInspectorCollapsed(!ui.inspectorCollapsed);
els.themeMode.onchange = event => {
  ui.themeMode = normalizeChoice(event.target.value, ["auto", "light", "dark"], "auto");
  storageSet(STORAGE_KEYS.theme, ui.themeMode);
  applyTheme();
};
els.localeMode.onchange = event => {
  ui.localeMode = normalizeChoice(event.target.value, ["auto", "zh-CN", "en"], "auto");
  storageSet(STORAGE_KEYS.locale, ui.localeMode);
  applyLocale();
};

for (const name of ["dragenter", "dragover"]) {
  els.dropzone.addEventListener(name, event => {
    event.preventDefault();
    els.dropzone.classList.add("active");
  });
}
for (const name of ["dragleave", "drop"]) {
  els.dropzone.addEventListener(name, event => {
    event.preventDefault();
    els.dropzone.classList.remove("active");
  });
}
els.dropzone.addEventListener("drop", event => handleFiles(event.dataTransfer.files));
els.dropzone.addEventListener("click", () => els.fileInput.click());

els.canvas.addEventListener("pointerdown", event => {
  if (!currentSlide()) return;
  const [x, y] = eventPoint(event);
  app.dragging = nearestHandle(x, y);
  if (app.dragging >= 0) els.canvas.setPointerCapture(event.pointerId);
});
els.canvas.addEventListener("pointermove", event => {
  const slide = currentSlide();
  if (!slide || app.dragging < 0) return;
  const [x, y] = eventPoint(event);
  app.quads[slide.filename][app.dragging] = toOriginalPoint(slide, x, y);
  app.dirtyThumbs.add(slide.filename);
  draw();
  renderCorners();
});
els.canvas.addEventListener("pointerup", event => {
  refreshCurrentThumbnail();
  app.dragging = -1;
  try { els.canvas.releasePointerCapture(event.pointerId); } catch (_) {}
});
window.addEventListener("keydown", event => {
  if (app.activeRun) {
    if (event.key === "ArrowLeft") loadSlide(app.index - 1);
    if (event.key === "ArrowRight") loadSlide(app.index + 1);
    return;
  }
  if (app.preview) {
    if (event.key === "ArrowLeft") loadPreview(app.previewIndex - 1);
    if (event.key === "ArrowRight") loadPreview(app.previewIndex + 1);
  }
});
window.addEventListener("resize", () => {
  if (app.zoomMode === "fit" && currentImageItem()) fitCanvas();
});
window.addEventListener("languagechange", () => {
  if (ui.localeMode === "auto") applyLocale();
});
if (window.matchMedia) {
  const scheme = window.matchMedia("(prefers-color-scheme: dark)");
  const redraw = () => {
    if (ui.themeMode === "auto" && currentImageItem()) draw();
  };
  if (scheme.addEventListener) {
    scheme.addEventListener("change", redraw);
  } else if (scheme.addListener) {
    scheme.addListener(redraw);
  }
}
applyTheme();
applyLocale();
</script>
</body>
</html>
